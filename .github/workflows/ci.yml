name: ci

on:
  pull_request:
  push:
    branches: [main]

# Newer pushes to the same branch cancel in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Forwarded into every job that needs them; values come from repo secrets.
  # See docs/runbooks/ci.md for the required secret list.
  DATABASE_URI: ${{ secrets.DATABASE_URI }}
  PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_AUTH_WEBHOOK_SECRET: ${{ secrets.SUPABASE_AUTH_WEBHOOK_SECRET }}

jobs:
  # -----------------------------------------------------------------------
  # gates — fast, parallel checks. Network-free where possible. < 3 min.
  # -----------------------------------------------------------------------
  gates:
    name: ${{ matrix.gate }}
    runs-on: ubuntu-latest
    timeout-minutes: 6
    strategy:
      fail-fast: false
      matrix:
        gate: [typecheck, lint, unit-test, contrast]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.gate }}
        run: |
          case "${{ matrix.gate }}" in
            typecheck) bun run typecheck ;;
            lint)      bun run lint ;;
            unit-test) bun run test ;;
            contrast)  bun run contrast:check ;;
          esac

  # -----------------------------------------------------------------------
  # build — produces the .next/ artifact for downstream e2e + lighthouse.
  # -----------------------------------------------------------------------
  build:
    name: build
    needs: gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload .next artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.run_id }}
          path: |
            .next
            !.next/cache
          retention-days: 1

  # -----------------------------------------------------------------------
  # e2e — Playwright + axe smoke. Production build to mirror real behavior.
  # -----------------------------------------------------------------------
  e2e:
    name: e2e (smoke + axe)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Download .next
        uses: actions/download-artifact@v4
        with:
          name: next-build-${{ github.run_id }}
          path: .next

      - name: Run Playwright
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  # -----------------------------------------------------------------------
  # lighthouse — perf/a11y/best-practices/SEO budgets. Per PRD §13.
  # -----------------------------------------------------------------------
  lighthouse:
    name: lighthouse
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Download .next
        uses: actions/download-artifact@v4
        with:
          name: next-build-${{ github.run_id }}
          path: .next

      - name: Lighthouse-CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  # -----------------------------------------------------------------------
  # summary — final pass/fail signal for branch protection rules.
  # -----------------------------------------------------------------------
  summary:
    name: ci summary
    needs: [gates, build, e2e, lighthouse]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all gates green
        run: |
          if [ "${{ needs.gates.result }}" != "success" ] \
          || [ "${{ needs.build.result }}" != "success" ] \
          || [ "${{ needs.e2e.result }}" != "success" ] \
          || [ "${{ needs.lighthouse.result }}" != "success" ]; then
            echo "One or more gates failed."
            echo "  gates: ${{ needs.gates.result }}"
            echo "  build: ${{ needs.build.result }}"
            echo "  e2e:   ${{ needs.e2e.result }}"
            echo "  lh:    ${{ needs.lighthouse.result }}"
            exit 1
          fi
          echo "All gates passed."
